- type: entity
  parent: BaseItem
  id: SkillBookBase
  abstract: true
  components:
  - type: Sprite
    sprite: Objects/Misc/books.rsi
    layers:
    - state: paper
    - state: cover_base
      color: "#332d27"
    - state: decor_wingette
      color: "#453f3a"
    - state: icon_text
  - type: Item
    size: Small
  - type: Tag
    tags:
    - Book
  - type: StaticPrice
    price: 500
  - type: MeleeWeapon
    soundHit:
      collection: Punch
    damage:
      types:
        Blunt: 1

- type: entity
  parent: SkillBookBase
  id: SkillBookSurgery
  components:
  - type: SkillBook
    skill: Surgery

- type: entity
