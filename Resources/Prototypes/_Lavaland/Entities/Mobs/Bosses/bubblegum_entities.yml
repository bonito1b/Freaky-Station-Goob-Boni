- type: entity
  id: LavalandBubblegumClone
  name: bubblegum
  suffix: Fake
  categories: [ HideSpawnMenu ]
  components:
  - type: Transform
    noRot: true
  - type: Sprite
    drawdepth: Mobs
    sprite: _Lavaland/Mobs/Bubblegum.rsi
    color: "#ff4d4db8"
    layers:
    - state: bubblegum
      shader: unshaded
  - type: TimedDespawn
    lifetime: 6
  - type: Tag
    tags:
    - HideContextMenu

- type: entity
  parent: [ BaseMobAsteroid, FlyingMobBase, LavalandMobBase ]
  id: MobLavalandBubblegumSlaughterling
  name: slaughterling
  description: A half-formed demon crawling out of Bubblegum's blood.
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    drawdepth: Mobs
    sprite: _Lavaland/Mobs/Bloodbrood.rsi
    layers:
    - state: bloodbrood
  - type: MobThresholds
    thresholds:
      0: Alive
      1: Dead
  - type: MovementSpeedModifier
    baseWalkSpeed: 3
    baseSprintSpeed: 3.5
  - type: MeleeWeapon
    soundHit:
      path: /Audio/_Lavaland/Mobs/Bosses/Bubblegum/pierce.ogg
    angle: 0
    attackRate: 1.2
    animation: WeaponArcBite
    damage:
      types:
        Piercing: 2
  - type: NpcFactionMember
    factions:
    - SimpleHostile
  - type: HTN
    rootTask:
      task: SimpleHostileCompound
    blackboard:
      VisionRadius: !type:Single
        32
      AggroVisionRadius: !type:Single
        32
      NavSmash: !type:Bool
        false
  - type: TimedDespawn
    lifetime: 10
  - type: NoSlip
  - type: Tag
    tags:
    - CannotSuicide
