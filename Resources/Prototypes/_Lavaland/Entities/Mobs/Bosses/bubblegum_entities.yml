- type: entity
  id: LavalandBubblegumEffectBase
  abstract: true
  categories: [ HideSpawnMenu ]
  components:
  - type: Transform
    anchored: true
    noRot: true
  - type: Physics
    bodyType: Static
    canCollide: false
  - type: Tag
    tags:
    - HideContextMenu
  - type: TimedDespawn
    lifetime: 1

- type: entity
  parent: LavalandBubblegumEffectBase
  id: LavalandBubblegumBloodSplatter
  name: bubblegum blood splatter
  components:
  - type: Sprite
    noRot: true
    drawdepth: FloorObjects
    sprite: _Lavaland/Effects/BubblegumBlood.rsi
    layers:
    - state: splatter1
      shader: unshaded
  - type: RandomSprite
    available:
    - 0:
        splatter1: ""
        splatter2: ""
        splatter3: ""
        splatter4: ""
        splatter5: ""
        splatter6: ""
  - type: TimedDespawn
    lifetime: 1.2

- type: entity
  parent: LavalandBubblegumEffectBase
  id: LavalandBubblegumBloodGibs
